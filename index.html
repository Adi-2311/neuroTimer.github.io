<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Terminal - Empirical Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Clinical Laboratory Palette */
            --bg-color: #EBEBEB;
            --panel-bg: #F5F5F5;
            --text-main: #111111;
            --text-muted: #666666;
            --border-hard: 1px solid #111111;
            --border-soft: 1px solid #CCCCCC;
            --highlight: #111111;
            --warning-bg: #333333;
            --warning-text: #FFFFFF;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            border-radius: 0 !important; /* Strict no-round policy */
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .mono { font-family: var(--font-mono); }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: var(--border-hard);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        h1 { font-size: 1.25rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-link { 
            font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500; 
            color: var(--text-main); text-decoration: none; 
            border: var(--border-hard); padding: 0.25rem 0.75rem;
            background: var(--bg-color);
            transition: all 0.1s;
        }
        .nav-link:hover { background: var(--text-main); color: var(--bg-color); }

        /* Main Display Panel */
        .panel {
            background-color: var(--panel-bg);
            border: var(--border-hard);
            margin-bottom: 2rem;
        }

        .timer-display {
            padding: 4rem 2rem;
            text-align: center;
        }
        .time-value { 
            font-family: var(--font-mono); font-size: 6rem; font-weight: 400; 
            color: var(--text-main); line-height: 1; margin-bottom: 1rem; letter-spacing: -0.02em;
        }
        .time-value.overflow { color: var(--warning-text); }
        .time-label { 
            font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 0.1em; 
        }
        .timer-display.overflowing {
            background-color: var(--warning-bg);
            color: var(--warning-text);
        }
        .timer-display.overflowing .time-label { color: #AAAAAA; }

        /* Control Grid Panel */
        .controls-header {
            font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
            padding: 0.5rem 1rem; border-bottom: var(--border-hard);
            background: #E0E0E0; letter-spacing: 0.05em;
        }
        .control-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
        }
        .cmd-btn {
            background-color: transparent; border: none; border-right: var(--border-hard);
            padding: 1.5rem 1rem; cursor: pointer; transition: all 0.1s; text-align: left;
            display: flex; flex-direction: column; justify-content: flex-start;
        }
        .cmd-btn:last-child { border-right: none; }
        .cmd-btn:hover { background: #E0E0E0; }
        .cmd-btn.active { background: var(--text-main); color: var(--bg-color); }
        .cmd-btn.active .btn-desc { color: #AAAAAA; }
        
        .btn-title { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; }
        .btn-desc { font-family: var(--font-sans); font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }

        /* Ledger Panel */
        .ledger-header {
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: var(--border-hard); background: #E0E0E0;
            padding: 0.5rem 1rem;
        }
        .section-title { 
            font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; 
            font-weight: 600; letter-spacing: 0.05em; 
        }

        /* ENV Variable Selector - Console Style */
        .env-wrapper { position: relative; font-family: var(--font-mono); font-size: 0.75rem; }
        .env-trigger {
            background: var(--text-main); color: var(--bg-color);
            padding: 0.25rem 0.75rem; cursor: pointer; user-select: none;
            display: flex; align-items: center; gap: 0.5rem; text-transform: uppercase;
        }
        .env-trigger:hover { background: #333333; }
        .env-dropdown {
            position: absolute; right: 0; top: 100%; width: 220px;
            background: var(--panel-bg); border: var(--border-hard);
            display: none; flex-direction: column; z-index: 100;
        }
        .env-dropdown.show { display: flex; }
        .env-item {
            padding: 0.5rem 0.75rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: var(--border-soft); text-transform: uppercase;
        }
        .env-item:last-child { border-bottom: none; }
        .env-item:hover { background: var(--text-main); color: var(--bg-color); }
        .env-item.add-btn { color: var(--text-muted); font-style: italic; }
        .env-item.add-btn:hover { color: var(--bg-color); }
        .env-delete { color: #B91C1C; font-weight: bold; padding-left: 0.5rem; }
        .env-item:hover .env-delete { color: #FF6B6B; }

        /* Ledger Table */
        .table-container { padding: 1rem; background: var(--panel-bg); }
        table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.8rem; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: var(--border-soft); }
        th { font-family: var(--font-mono); text-transform: uppercase; color: var(--text-muted); font-weight: normal; }
        tr:last-child td { border-bottom: none; }
        .tag { border: var(--border-hard); padding: 1px 4px; font-size: 0.7em; }

        @media (max-width: 768px) { .control-grid { grid-template-columns: repeat(2, 1fr); } .cmd-btn:nth-child(2) { border-right: none; } .cmd-btn:nth-child(1), .cmd-btn:nth-child(2) { border-bottom: var(--border-hard); } }
        @media (max-width: 480px) { .control-grid { grid-template-columns: 1fr; } .cmd-btn { border-right: none; border-bottom: var(--border-hard); } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Seq_Protocol</h1>
            <div class="mono" style="font-size: 0.75rem; color: var(--text-muted);">Empirical_Input_Terminal_v2.1</div>
        </div>
        <a href="stats.html" class="nav-link">SYS.OUTPUT_REPORT</a>
    </header>

    <!-- Main Timer Panel -->
    <div class="panel">
        <div class="controls-header">SYS.CLOCK_FEED</div>
        <div class="timer-display" id="timer-display">
            <div class="time-value" id="time-val">00:00</div>
            <div class="time-label" id="time-lbl">AWAITING_PROTOCOL_INIT</div>
        </div>
    </div>

    <!-- Control Grid Panel -->
    <div class="panel">
        <div class="controls-header">EXECUTE_PROTOCOL</div>
        <div class="control-grid">
            <button class="cmd-btn" id="btn-dmn" onclick="startProtocol('DMN Reset', 10)">
                <div class="btn-title">DMN Reset [10M]</div>
                <div class="btn-desc">Visual fixation. Down-regulates DMN. Auto-chains to Work.</div>
            </button>
            <button class="cmd-btn" id="btn-med" onclick="startProtocol('Meditation', 5)">
                <div class="btn-title">Meditation [05M]</div>
                <div class="btn-desc">Breath-anchored. Regulates attention. Auto-chains to Work.</div>
            </button>
            <button class="cmd-btn" id="btn-work" onclick="startProtocol('Work', 25)">
                <div class="btn-title">Work Block [25M]</div>
                <div class="btn-desc">Standard high-yield cognitive execution phase.</div>
            </button>
            <button class="cmd-btn" id="btn-zen" onclick="startProtocol('Zen Mode', null)">
                <div class="btn-title">Zen Mode [∞]</div>
                <div class="btn-desc">Temporal blindness. Clock hidden to prevent anxiety.</div>
            </button>
        </div>
    </div>
    
    <!-- Ledger Panel -->
    <div class="panel">
        <div class="ledger-header">
            <div class="section-title">LOCAL_SESSION_LEDGER</div>
            
            <!-- Custom Environment Dropdown -->
            <div class="env-wrapper">
                <div class="env-trigger" onclick="toggleEnvMenu(event)">
                    <span id="current-env-display">[ ENV_VAR: HOME ]</span>
                    <span>▼</span>
                </div>
                <div class="env-dropdown" id="env-dropdown">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Env</th>
                        <th>Protocol</th>
                        <th>Target</th>
                        <th>Actual</th>
                    </tr>
                </thead>
                <tbody id="ledger-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ENVIRONMENT VARIABLE LOGIC ---
        const DEFAULT_ENVS = ['HOME', 'SCHOOL', 'WORK', 'LIBRARY'];
        let customEnvs = JSON.parse(localStorage.getItem('customEnvs')) || [];
        let currentEnv = localStorage.getItem('currentEnv') || 'HOME';

        function initEnvMenu() {
            document.getElementById('current-env-display').innerText = `[ ENV: ${currentEnv} ]`;
            renderEnvDropdown();
        }

        function toggleEnvMenu(event) {
            event.stopPropagation();
            document.getElementById('env-dropdown').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.env-wrapper')) {
                document.getElementById('env-dropdown').classList.remove('show');
            }
        });

        function selectEnv(env) {
            currentEnv = env;
            localStorage.setItem('currentEnv', env);
            document.getElementById('current-env-display').innerText = `[ ENV: ${env} ]`;
            document.getElementById('env-dropdown').classList.remove('show');
        }

        function addCustomEnv(event) {
            event.stopPropagation();
            if (customEnvs.length >= 3) {
                alert("SYS.ERR: Max 3 custom environment variables.");
                return;
            }
            let newTag = prompt("DEFINE NEW ENV_VAR (Max 10 chars):");
            if (newTag) {
                newTag = newTag.trim().substring(0, 10).toUpperCase(); 
                if (newTag && !DEFAULT_ENVS.includes(newTag) && !customEnvs.includes(newTag)) {
                    customEnvs.push(newTag);
                    localStorage.setItem('customEnvs', JSON.stringify(customEnvs));
                    selectEnv(newTag);
                    renderEnvDropdown();
                }
            }
        }

        function deleteCustomEnv(env, event) {
            event.stopPropagation();
            customEnvs = customEnvs.filter(e => e !== env);
            localStorage.setItem('customEnvs', JSON.stringify(customEnvs));
            if (currentEnv === env) {
                selectEnv('HOME'); 
            }
            renderEnvDropdown();
        }

        function renderEnvDropdown() {
            const dropdown = document.getElementById('env-dropdown');
            dropdown.innerHTML = '';
            
            DEFAULT_ENVS.forEach(env => {
                dropdown.innerHTML += `<div class="env-item" onclick="selectEnv('${env}')">${env}</div>`;
            });

            customEnvs.forEach(env => {
                dropdown.innerHTML += `
                    <div class="env-item">
                        <span onclick="selectEnv('${env}')" style="flex-grow: 1;">${env}</span>
                        <span class="env-delete" onclick="deleteCustomEnv('${env}', event)">[X]</span>
                    </div>
                `;
            });

            if (customEnvs.length < 3) {
                dropdown.innerHTML += `<div class="env-item add-btn" onclick="addCustomEnv(event)">+ DEFINE_NEW [${3 - customEnvs.length} AVAIL]</div>`;
            }
        }

        // --- TIMER & PROTOCOL LOGIC ---
        let timerInterval;
        let secondsElapsed = 0;
        let targetSeconds = 0;
        let currentMode = null;
        let isOverflowing = false;
        
        let studySessions = JSON.parse(localStorage.getItem('studySessions')) || [];

        function formatTime(totalSeconds, hideIfZen = false) {
            if (hideIfZen && !isOverflowing) return "[ -- : -- ]";
            
            const isNegative = totalSeconds < 0;
            const absSec = Math.abs(totalSeconds);
            const m = Math.floor(absSec / 60).toString().padStart(2, '0');
            const s = (absSec % 60).toString().padStart(2, '0');
            return isNegative ? `+${m}:${s}` : `${m}:${s}`;
        }

        function updateDisplay() {
            const displayObj = document.getElementById('time-val');
            const labelObj = document.getElementById('time-lbl');
            const containerObj = document.getElementById('timer-display');
            
            let timeRemaining = targetSeconds ? targetSeconds - secondsElapsed : secondsElapsed;
            
            if (targetSeconds && timeRemaining < 0) {
                isOverflowing = true;
                containerObj.classList.add('overflowing');
                labelObj.innerText = `SYS.OVERFLOW_DETECTED // CLICK TO TERMINATE`;
                displayObj.innerText = formatTime(timeRemaining);
            } else {
                isOverflowing = false;
                containerObj.classList.remove('overflowing');
                labelObj.innerText = `EXEC: ${currentMode} // CLICK TO TERMINATE`;
                displayObj.innerText = formatTime(timeRemaining, currentMode === 'Zen Mode');
            }
        }

        function startProtocol(mode, minutes) {
            if (currentMode !== null) {
                stopAndLogProtocol();
                return;
            }

            currentMode = mode;
            targetSeconds = minutes ? minutes * 60 : null;
            secondsElapsed = 0;
            isOverflowing = false;
            
            document.querySelectorAll('.cmd-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode === 'DMN Reset' ? 'btn-dmn' : 
                                  mode === 'Meditation' ? 'btn-med' : 
                                  mode === 'Zen Mode' ? 'btn-zen' : 'btn-work').classList.add('active');

            document.getElementById('timer-display').style.cursor = 'pointer';
            document.getElementById('timer-display').onclick = stopAndLogProtocol;

            updateDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateDisplay();
            }, 1000);
        }

        function stopAndLogProtocol() {
            clearInterval(timerInterval);
            
            if (secondsElapsed > 5) {
                logSession();
            }

            let nextMode = null;
            if (currentMode === 'DMN Reset' || currentMode === 'Meditation') {
                if (!isOverflowing && secondsElapsed >= (targetSeconds - 5)) {
                    nextMode = 'Work';
                }
            }

            resetUI();

            if (nextMode) {
                setTimeout(() => startProtocol(nextMode, 25), 500);
            }
        }

        function logSession() {
            let sessionObj = {
                blocks: [{
                    blockId: Date.now(),
                    startTime: new Date().toISOString(),
                    taskName: currentMode,
                    environment: currentEnv,
                    plannedSec: targetSeconds,
                    durationSec: secondsElapsed
                }]
            };
            
            studySessions.push(sessionObj);
            localStorage.setItem('studySessions', JSON.stringify(studySessions));
            renderLedger();
        }

        function resetUI() {
            currentMode = null;
            targetSeconds = 0;
            secondsElapsed = 0;
            isOverflowing = false;
            const containerObj = document.getElementById('timer-display');
            containerObj.style.cursor = 'default';
            containerObj.onclick = null;
            containerObj.classList.remove('overflowing');
            document.getElementById('time-val').innerText = "00:00";
            document.getElementById('time-lbl').innerText = "AWAITING_PROTOCOL_INIT";
            
            document.querySelectorAll('.cmd-btn').forEach(btn => btn.classList.remove('active'));
        }

        function renderLedger() {
            const tbody = document.getElementById('ledger-body');
            tbody.innerHTML = '';
            
            let allBlocks = [];
            studySessions.forEach(session => {
                if (session.blocks) allBlocks.push(...session.blocks);
            });

            allBlocks.reverse().forEach(block => {
                const targetMins = block.plannedSec ? Math.floor(block.plannedSec / 60) : '∞';
                const actualMins = Math.floor(block.durationSec / 60);
                const env = block.environment || 'UNKNOWN';

                tbody.innerHTML += `
                    <tr>
                        <td><span class="tag">${env}</span></td>
                        <td>${block.taskName}</td>
                        <td>${targetMins}M</td>
                        <td>${actualMins}M</td>
                    </tr>
                `;
            });
        }

        window.onload = () => {
            initEnvMenu();
            renderLedger();
        };

    </script>
</body>
</html>
