<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F7;
            --text-primary: #1E3A5F;
            --accent: #4A9B9B;
            --border-strict: 1px solid #1E3A5F;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        body.work-mode {
            background-color: #000000;
            color: #F5F5F7;
        }
        body.work-mode .terminal-container { border-color: #333; }
        body.work-mode button { border-color: #F5F5F7; color: #F5F5F7; }
        body.work-mode button:hover { background-color: #F5F5F7; color: #000000; }
        body.work-mode input, body.work-mode .event-log { border-color: #333; }
        body.work-mode .log-entry { border-bottom-color: rgba(245, 245, 247, 0.3); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            padding: 2rem;
            border: var(--border-strict);
            background: transparent;
        }

        .main-panel { display: flex; flex-direction: column; }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-bottom: var(--border-strict);
            padding-bottom: 0.5rem;
        }

        .mono { font-family: var(--font-mono); }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            background: transparent;
            border: var(--border-strict);
            color: inherit;
            margin-bottom: 2rem;
            outline: none;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 400;
            text-align: center;
            margin: 2rem 0;
            letter-spacing: -0.05em;
            font-variant-numeric: tabular-nums;
            height: 120px; /* Prevents layout jump when text changes */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pulsing animation for hidden Zen Mode timer */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .pulse-text {
            animation: pulse 2s infinite ease-in-out;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Changed to 2x2 grid for 4 buttons */
            gap: 1rem;
        }

        button {
            padding: 0.75rem;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            border: var(--border-strict);
            color: inherit;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--text-primary);
            color: var(--bg);
        }

        .btn-stop {
            grid-column: 1 / -1;
            margin-top: 1rem;
            display: none;
        }

        /* Sidebar Log */
        .side-panel {
            border-left: var(--border-strict);
            padding-left: 2rem;
            display: flex;
            flex-direction: column;
        }

        .event-log {
            flex-grow: 1;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            overflow-y: auto;
            max-height: 400px;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dotted rgba(30, 58, 95, 0.3);
            word-wrap: break-word;
        }

        .log-time { color: var(--accent); margin-right: 0.5rem;}
        
        .sys-msg { color: var(--accent); font-weight: 500; }

        @media (max-width: 768px) {
            .terminal-container { grid-template-columns: 1fr; }
            .side-panel { border-left: none; border-top: var(--border-strict); padding-left: 0; padding-top: 2rem; margin-top: 2rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        
        <!-- MAIN CONTROLS -->
        <div class="main-panel">
            <h1>Active Task</h1>
            <input type="text" id="task-input" placeholder="Enter task (e.g., Read Chapter 4)">
            
            <div id="status-label" class="mono" style="text-align: center; font-size: 0.85rem; color: var(--accent);">IDLE</div>
            <div class="timer-display mono" id="timer">00:00</div>
            
            <div class="controls" id="primary-controls">
                <button onclick="startStandardTimer('DMN Reset', 600)">DMN Reset (10m)</button>
                <button onclick="startStandardTimer('Meditation', 300)">Meditate (5m)</button>
                <button onclick="startStandardTimer('Work', 1500)">Work (25m)</button>
                <button onclick="startZenMode()">Zen Mode (∞)</button>
            </div>
            
            <button class="btn-stop" id="stop-btn" onclick="stopCurrentBlock()">Conclude Current Block</button>
        </div>

        <!-- UTILITY LOG -->
        <div class="side-panel">
            <h1>Session Log</h1>
            <div class="event-log" id="event-log">
                <!-- Logs injected here -->
                <div class="log-entry">
                    <span class="log-time">[System]</span> Terminal initialized.
                </div>
            </div>
            <a href="stats.html" class="mono" style="font-size: 0.75rem; text-decoration: none; color: inherit; margin-top: 1rem; border: var(--border-strict); padding: 0.5rem; text-align: center;">View Full Stats &rarr;</a>
        </div>

    </div>

    <script>
        let intervalTracker;
        let activeState = '';
        let isZenMode = false;
        let elapsedZenSeconds = 0;

        function formatTime() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}]`;
        }

        function appendLog(message, isSystem = false) {
            const logBox = document.getElementById('event-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const sysClass = isSystem ? 'sys-msg' : '';
            entry.innerHTML = `<span class="log-time">${formatTime()}</span> <span class="${sysClass}">${message}</span>`;
            logBox.prepend(entry); // Prepends so the newest log is at the top
        }

        function triggerUIMode(modeName, hideTime = false) {
            const task = document.getElementById('task-input').value || 'Unspecified target';
            document.getElementById('status-label').innerText = `${modeName.toUpperCase()} ACTIVE`;
            
            document.getElementById('primary-controls').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';

            if (modeName === 'Work' || modeName === 'Zen Mode') {
                document.body.classList.add('work-mode');
            } else {
                document.body.classList.remove('work-mode');
            }

            appendLog(`Started: ${modeName} -> ${task}`);

            if (hideTime) {
                const display = document.getElementById('timer');
                display.innerText = "[ - - - ]";
                display.classList.add('pulse-text');
            }
        }

        function startStandardTimer(mode, seconds) {
            clearInterval(intervalTracker);
            activeState = mode;
            isZenMode = false;
            
            triggerUIMode(mode, false);
            const display = document.getElementById('timer');
            display.classList.remove('pulse-text');
            
            intervalTracker = setInterval(() => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (seconds <= 0) {
                    clearInterval(intervalTracker);
                    appendLog(`Completed: ${mode}`);
                    resetUI();
                }
                seconds--;
            }, 1000);
        }

        function startZenMode() {
            clearInterval(intervalTracker);
            activeState = 'Zen Mode';
            isZenMode = true;
            elapsedZenSeconds = 0;
            
            triggerUIMode('Zen Mode', true);

            intervalTracker = setInterval(() => {
                elapsedZenSeconds++;
            }, 1000);
        }

        function stopCurrentBlock() {
            clearInterval(intervalTracker);

            if (isZenMode) {
                const m = Math.floor(elapsedZenSeconds / 60);
                const s = elapsedZenSeconds % 60;
                appendLog(`Concluded: Zen Mode (Duration: ${m}m ${s}s)`);
                
                // Calculate rest ratio (1:5 rule. 5 mins work = 1 min rest)
                const restRequiredSeconds = Math.floor(elapsedZenSeconds / 5);
                const r_m = Math.floor(restRequiredSeconds / 60);
                const r_s = restRequiredSeconds % 60;
                
                appendLog(`Calculation: Required recovery period is ${r_m}m ${r_s}s.`, true);
            } else {
                appendLog(`Interrupted: ${activeState}`);
            }

            resetUI();
        }

        function resetUI() {
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('timer').classList.remove('pulse-text');
            document.getElementById('status-label').innerText = "IDLE";
            
            document.getElementById('primary-controls').style.display = 'grid';
            document.getElementById('stop-btn').style.display = 'none';
            document.body.classList.remove('work-mode');
            
            activeState = '';
            isZenMode = false;
        }
    </script>
</body>
</html>
