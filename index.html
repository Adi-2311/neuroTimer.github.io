<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F7;
            --text-primary: #1E3A5F;
            --accent: #4A9B9B;
            --warning: #D97757;
            --border-strict: 1px solid #1E3A5F;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        body.work-mode {
            background-color: #000000;
            color: #F5F5F7;
        }
        body.work-mode .terminal-container { border-color: #333; }
        body.work-mode button { border-color: #F5F5F7; color: #F5F5F7; }
        body.work-mode button:hover { background-color: #F5F5F7; color: #000000; }
        body.work-mode input, body.work-mode .event-log, body.work-mode .side-panel-header { border-color: #333; }
        body.work-mode .log-entry { border-bottom-color: rgba(245, 245, 247, 0.3); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            padding: 2rem;
            border: var(--border-strict);
            background: transparent;
        }

        .main-panel { display: flex; flex-direction: column; }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-bottom: var(--border-strict);
            padding-bottom: 0.5rem;
        }

        .mono { font-family: var(--font-mono); }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            background: transparent;
            border: var(--border-strict);
            color: inherit;
            margin-bottom: 2rem;
            outline: none;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 400;
            text-align: center;
            margin: 2rem 0;
            letter-spacing: -0.05em;
            font-variant-numeric: tabular-nums;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .timer-display.overflow {
            color: var(--warning);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .pulse-text { animation: pulse 2s infinite ease-in-out; }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        button {
            padding: 0.75rem;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            border: var(--border-strict);
            color: inherit;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--text-primary);
            color: var(--bg);
        }

        .btn-stop {
            grid-column: 1 / -1;
            margin-top: 1rem;
            display: none;
        }
        
        .btn-dynamic {
            grid-column: 1 / -1;
            border-style: dashed;
            display: none;
        }

        /* Sidebar Log */
        .side-panel {
            border-left: var(--border-strict);
            padding-left: 2rem;
            display: flex;
            flex-direction: column;
        }

        .side-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: var(--border-strict);
            padding-bottom: 0.5rem;
        }

        .side-panel-header h1 {
            border: none;
            margin: 0;
            padding: 0;
        }

        /* ENV Variable Custom Dropdown */
        .env-wrapper { position: relative; font-family: var(--font-mono); font-size: 0.75rem; }
        .env-trigger {
            background: transparent; border: 1px dashed var(--accent); color: var(--accent);
            padding: 0.25rem 0.5rem; cursor: pointer; user-select: none;
            display: flex; align-items: center; gap: 0.25rem; transition: background 0.2s;
        }
        .env-trigger:hover { background: rgba(74, 155, 155, 0.1); }
        .env-dropdown {
            position: absolute; right: 0; top: calc(100% + 0.5rem); width: 180px;
            background: var(--bg); border: var(--border-strict);
            display: none; flex-direction: column; z-index: 100;
        }
        body.work-mode .env-dropdown { background: #000; border-color: #333; }
        .env-dropdown.show { display: flex; }
        .env-item {
            padding: 0.5rem 0.75rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dotted rgba(30, 58, 95, 0.3); transition: background 0.2s;
        }
        body.work-mode .env-item { border-bottom-color: #333; }
        .env-item:last-child { border-bottom: none; }
        .env-item:hover { background: rgba(74, 155, 155, 0.1); color: var(--accent); }
        .env-item.add-btn { color: var(--text-muted); font-style: italic; }
        .env-item.add-btn:hover { color: var(--text-primary); }
        body.work-mode .env-item.add-btn:hover { color: #FFF; }
        .env-delete { color: var(--warning); font-weight: bold; padding-left: 0.5rem; opacity: 0.5; }
        .env-delete:hover { opacity: 1; }

        .event-log {
            flex-grow: 1;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            overflow-y: auto;
            max-height: 400px;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dotted rgba(30, 58, 95, 0.3);
            word-wrap: break-word;
        }

        .log-time { color: var(--accent); margin-right: 0.5rem;}
        .sys-msg { color: var(--accent); font-weight: 500; }
        .warn-msg { color: var(--warning); font-weight: 500; }

        @media (max-width: 768px) {
            .terminal-container { grid-template-columns: 1fr; }
            .side-panel { border-left: none; border-top: var(--border-strict); padding-left: 0; padding-top: 2rem; margin-top: 2rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        
        <div class="main-panel">
            <h1>Active Task</h1>
            <input type="text" id="task-input" placeholder="Enter task (e.g., Read Chapter 4)">
            
            <div id="status-label" class="mono" style="text-align: center; font-size: 0.85rem; color: var(--accent);">IDLE</div>
            <div class="timer-display mono" id="timer">00:00</div>
            
            <div class="controls" id="primary-controls">
                <button onclick="startStandardTimer('DMN Reset', 600)">DMN Reset (10m)</button>
                <button onclick="startStandardTimer('Meditation', 300)">Meditate (5m)</button>
                <button onclick="startStandardTimer('Work', 1500)">Work (25m)</button>
                <button onclick="startZenMode()">Zen Mode (∞)</button>
                <button id="dynamic-recovery-btn" class="btn-dynamic" onclick="startCalculatedRecovery()">Initiate Calculated Recovery</button>
            </div>
            
            <button class="btn-stop" id="stop-btn" onclick="stopCurrentBlock()">Conclude Current Block</button>
        </div>

        <div class="side-panel">
            <div class="side-panel-header">
                <h1>Session Log</h1>
                <div class="env-wrapper">
                    <div class="env-trigger" onclick="toggleEnvMenu(event)">
                        <span id="current-env-display">ENV: Home</span>
                        <span>▾</span>
                    </div>
                    <div class="env-dropdown" id="env-dropdown">
                        </div>
                </div>
            </div>
            <div class="event-log" id="event-log">
                <div class="log-entry">
                    <span class="log-time">[System]</span> Terminal initialized.
                </div>
            </div>
            <a href="stats.html" class="mono" style="font-size: 0.75rem; text-decoration: none; color: inherit; margin-top: 1rem; border: var(--border-strict); padding: 0.5rem; text-align: center;">View Full Stats &rarr;</a>
        </div>

    </div>

    <script>
        // --- ENVIRONMENT VARIABLE LOGIC ---
        const DEFAULT_ENVS = ['Home', 'School', 'Work', 'Library'];
        let customEnvs = JSON.parse(localStorage.getItem('customEnvs')) || [];
        let currentEnv = localStorage.getItem('currentEnv') || 'Home';

        function initEnvMenu() {
            document.getElementById('current-env-display').innerText = `ENV: ${currentEnv}`;
            renderEnvDropdown();
        }

        function toggleEnvMenu(event) {
            event.stopPropagation();
            document.getElementById('env-dropdown').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.env-wrapper')) {
                document.getElementById('env-dropdown').classList.remove('show');
            }
        });

        function selectEnv(env) {
            currentEnv = env;
            localStorage.setItem('currentEnv', env);
            document.getElementById('current-env-display').innerText = `ENV: ${env}`;
            document.getElementById('env-dropdown').classList.remove('show');
        }

        function addCustomEnv(event) {
            event.stopPropagation();
            if (customEnvs.length >= 3) {
                alert("Terminal limit reached: Maximum 3 custom tags.");
                return;
            }
            let newTag = prompt("Enter new environment tag (max 10 chars):");
            if (newTag) {
                newTag = newTag.trim().substring(0, 10);
                if (newTag && !DEFAULT_ENVS.includes(newTag) && !customEnvs.includes(newTag)) {
                    customEnvs.push(newTag);
                    localStorage.setItem('customEnvs', JSON.stringify(customEnvs));
                    selectEnv(newTag);
                    renderEnvDropdown();
                }
            }
        }

        function deleteCustomEnv(env, event) {
            event.stopPropagation();
            customEnvs = customEnvs.filter(e => e !== env);
            localStorage.setItem('customEnvs', JSON.stringify(customEnvs));
            if (currentEnv === env) selectEnv('Home');
            renderEnvDropdown();
        }

        function renderEnvDropdown() {
            const dropdown = document.getElementById('env-dropdown');
            dropdown.innerHTML = '';
            
            DEFAULT_ENVS.forEach(env => {
                dropdown.innerHTML += `<div class="env-item" onclick="selectEnv('${env}')">${env}</div>`;
            });
            customEnvs.forEach(env => {
                dropdown.innerHTML += `
                    <div class="env-item">
                        <span onclick="selectEnv('${env}')" style="flex-grow: 1;">${env}</span>
                        <span class="env-delete" onclick="deleteCustomEnv('${env}', event)">×</span>
                    </div>
                `;
            });
            if (customEnvs.length < 3) {
                dropdown.innerHTML += `<div class="env-item add-btn" onclick="addCustomEnv(event)">+ Add Custom [${3 - customEnvs.length} left]</div>`;
            }
        }

        // --- TIMER & PROTOCOL LOGIC ---
        let intervalTracker;
        let activeState = '';
        let isZenMode = false;
        
        let targetSeconds = 0;
        let elapsedSeconds = 0;
        let isOverflowing = false;
        let pendingRecoverySeconds = 0;
        
        // Silent Telemetry: Attentional Fragmentation
        let tabSwitchCount = 0;

        // Watch for tab switching to measure fragmented attention
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && activeState === 'Work') {
                tabSwitchCount++;
                appendLog(`[Alert] Focus lost. Tab switch detected. (Total: ${tabSwitchCount})`, 'warning');
            }
        });

        function formatTime() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}]`;
        }
        
        function formatDuration(totalSeconds) {
            const m = Math.floor(Math.abs(totalSeconds) / 60);
            const s = Math.abs(totalSeconds) % 60;
            return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function appendLog(message, type = 'normal') {
            const logBox = document.getElementById('event-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let msgClass = '';
            if (type === 'system') msgClass = 'sys-msg';
            if (type === 'warning') msgClass = 'warn-msg';
            
            entry.innerHTML = `<span class="log-time">${formatTime()}</span> <span class="${msgClass}">${message}</span>`;
            logBox.prepend(entry);
        }

        function triggerUIMode(modeName, hideTime = false) {
            const task = document.getElementById('task-input').value || 'Unspecified target';
            document.getElementById('status-label').innerText = `${modeName.toUpperCase()} ACTIVE`;
            
            document.getElementById('primary-controls').style.display = 'none';
            document.getElementById('dynamic-recovery-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';

            if (modeName === 'Work' || modeName === 'Zen Mode') {
                document.body.classList.add('work-mode');
            } else {
                document.body.classList.remove('work-mode');
            }

            if (task !== 'Unspecified target') {
                appendLog(`Started: ${modeName} -> ${task}`);
            } else {
                appendLog(`Started: ${modeName}`);
            }

            if (hideTime) {
                const display = document.getElementById('timer');
                display.innerText = "[ - - - ]";
                display.classList.add('pulse-text');
            }
        }

        function saveBlockData() {
            let studySessions = JSON.parse(localStorage.getItem('studySessions')) || [];
            let sessionObj = {
                blocks: [{
                    blockId: Date.now(),
                    startTime: new Date().toISOString(),
                    taskName: activeState,
                    environment: currentEnv,
                    plannedSec: targetSeconds,
                    durationSec: elapsedSeconds,
                    interruptions: tabSwitchCount // Telemetry saved for stats.html!
                }]
            };
            studySessions.push(sessionObj);
            localStorage.setItem('studySessions', JSON.stringify(studySessions));
        }

        function startStandardTimer(mode, seconds) {
            clearInterval(intervalTracker);
            activeState = mode;
            isZenMode = false;
            targetSeconds = seconds;
            elapsedSeconds = 0;
            isOverflowing = false;
            tabSwitchCount = 0; // Reset metrics
            
            triggerUIMode(mode, false);
            const display = document.getElementById('timer');
            display.classList.remove('pulse-text', 'overflow');
            
            intervalTracker = setInterval(() => {
                elapsedSeconds++;
                const remaining = targetSeconds - elapsedSeconds;
                
                if (remaining > 0) {
                    display.innerText = formatDuration(remaining);
                } else if (remaining === 0) {
                    display.innerText = "00:00";
                    
                    // AUTO-TRANSITION LOGIC FOR PRIMING PHASES
                    if (activeState === 'DMN Reset' || activeState === 'Meditation') {
                        clearInterval(intervalTracker);
                        saveBlockData(); // Save the priming block
                        appendLog(`Priming complete. Auto-initiating Work sequence.`, 'system');
                        startStandardTimer('Work', 1500); // Trigger 25-minute Work Block
                        return;
                    }

                } else {
                    // OVERFLOW LOGIC
                    if (!isOverflowing) {
                        isOverflowing = true;
                        appendLog(`Target duration reached. Overflow tracking initiated.`, 'warning');
                        document.getElementById('status-label').innerText = `${activeState.toUpperCase()} - OVERFLOW`;
                        display.classList.add('overflow');
                    }
                    display.innerText = `+${formatDuration(Math.abs(remaining))}`;
                }
            }, 1000);
        }

        function startZenMode() {
            clearInterval(intervalTracker);
            activeState = 'Zen Mode';
            isZenMode = true;
            elapsedSeconds = 0;
            tabSwitchCount = 0;
            
            triggerUIMode('Zen Mode', true);

            intervalTracker = setInterval(() => {
                elapsedSeconds++;
            }, 1000);
        }
        
        function startCalculatedRecovery() {
            startStandardTimer('Recovery', pendingRecoverySeconds);
        }

        function stopCurrentBlock() {
            clearInterval(intervalTracker);
            
            // Only log if they actually spent some time (prevent accidental double clicks)
            if (elapsedSeconds > 2) {
                saveBlockData();
            }

            if (isZenMode) {
                const m = Math.floor(elapsedSeconds / 60);
                const s = elapsedSeconds % 60;
                appendLog(`Concluded: Zen Mode (Duration: ${m}m ${s}s)`);
                
                pendingRecoverySeconds = Math.floor(elapsedSeconds / 5);
                const r_m = Math.floor(pendingRecoverySeconds / 60);
                const r_s = pendingRecoverySeconds % 60;
                
                appendLog(`Calculation: Required recovery period is ${r_m}m ${r_s}s.`, 'system');
                
            } else {
                if (isOverflowing) {
                    const over_m = Math.floor(Math.abs(targetSeconds - elapsedSeconds) / 60);
                    const over_s = Math.abs(targetSeconds - elapsedSeconds) % 60;
                    appendLog(`Concluded: ${activeState} (Includes ${over_m}m ${over_s}s overflow)`, 'warning');
                } else {
                    appendLog(`Concluded: ${activeState}`);
                }
            }

            resetUI();
        }

        function resetUI() {
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('timer').classList.remove('pulse-text', 'overflow');
            document.getElementById('status-label').innerText = "IDLE";
            
            document.getElementById('primary-controls').style.display = 'grid';
            document.getElementById('stop-btn').style.display = 'none';
            document.body.classList.remove('work-mode');
            
            if (isZenMode && pendingRecoverySeconds > 0) {
                const btn = document.getElementById('dynamic-recovery-btn');
                const m = Math.floor(pendingRecoverySeconds / 60);
                const s = pendingRecoverySeconds % 60;
                btn.innerText = `Initiate Calculated Recovery (${m}m ${s}s)`;
                btn.style.display = 'block';
            } else {
                document.getElementById('dynamic-recovery-btn').style.display = 'none';
            }
            
            activeState = '';
            isZenMode = false;
            isOverflowing = false;
            tabSwitchCount = 0;
        }

        window.onload = initEnvMenu;
    </script>
</body>
</html>
