<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - Focus Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F7;
            --text-primary: #1E3A5F;
            --accent: #4A9B9B;
            --warning: #D97757;
            --border-strict: 1px solid #1E3A5F;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.25rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2rem;
            border-bottom: var(--border-strict);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .mono { font-family: var(--font-mono); }
        
        .nav-link {
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--accent);
        }

        .metrics-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .metric-box {
            border: var(--border-strict);
            padding: 1.5rem;
            text-align: center;
        }

        .metric-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            color: var(--accent);
        }

        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .table-container {
            border: var(--border-strict);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-align: left;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px dotted rgba(30, 58, 95, 0.3);
        }

        th {
            background-color: rgba(30, 58, 95, 0.05);
            font-weight: 600;
            text-transform: uppercase;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td { border-bottom: none; }

        .tag {
            background-color: rgba(74, 155, 155, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        
        .warning-text { color: var(--warning); font-weight: 600; }

    </style>
</head>
<body>

    <h1>
        <span>Session Data Ledger</span>
        <a href="index.html" class="nav-link mono">&larr; Back to Terminal</a>
    </h1>

    <div class="metrics-container">
        <div class="metric-box">
            <div class="metric-title">Total Active Load</div>
            <div class="metric-value" id="total-time">0h 0m</div>
        </div>
        <div class="metric-box">
            <div class="metric-title">Deep Work Blocks</div>
            <div class="metric-value" id="work-blocks">0</div>
        </div>
        <div class="metric-box">
            <div class="metric-title">Attentional Breaches</div>
            <div class="metric-value warning-text" id="total-ints">0</div>
        </div>
    </div>

    <h2>Raw Session Log</h2>
    <div class="table-container">
        <table id="session-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Loc / Env</th>
                    <th>Protocol</th>
                    <th>Target Goal</th>
                    <th>Audio</th>
                    <th>Target Time</th>
                    <th>Actual Time</th>
                    <th>Ints</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>

    <button onclick="clearData()" style="margin-top: 2rem; padding: 0.5rem 1rem; font-family: var(--font-mono); font-size: 0.75rem; background: transparent; border: 1px solid var(--warning); color: var(--warning); cursor: pointer; text-transform: uppercase;">Purge Database</button>

    <script>
        function formatDuration(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function loadStats() {
            const sessions = JSON.parse(localStorage.getItem('studySessions')) || [];
            const tbody = document.querySelector('#session-table tbody');
            
            let totalLoadSec = 0;
            let workCount = 0;
            let intCount = 0;

            if (sessions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; opacity: 0.5;">No data logged yet.</td></tr>';
                return;
            }

            sessions.slice().reverse().forEach(session => {
                // Formatting metrics
                const dateObj = new Date(session.date);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')}`;
                
                const isWork = ['Work', 'Study', 'Zen Mode'].includes(session.task);
                if (isWork) {
                    totalLoadSec += session.elapsedSec;
                    workCount++;
                    intCount += session.interruptions || 0;
                }

                const targetStr = session.targetSec ? Math.floor(session.targetSec/60) + 'm' : '∞';
                const actualStr = Math.floor(session.elapsedSec/60) + 'm';
                
                const ints = session.interruptions || 0;
                const intDisplay = ints > 0 ? `<span class="warning-text">${ints}</span>` : '0';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="opacity: 0.7;">${dateStr}</td>
                    <td><span class="tag">${session.location}</span></td>
                    <td style="font-weight: 500;">${session.task}</td>
                    <td style="opacity: 0.8;">${session.customTarget}</td>
                    <td>${session.audioMode}</td>
                    <td>${targetStr}</td>
                    <td>${actualStr}</td>
                    <td>${intDisplay}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('total-time').innerText = formatDuration(totalLoadSec);
            document.getElementById('work-blocks').innerText = workCount;
            document.getElementById('total-ints').innerText = intCount;
        }

        function clearData() {
            if(confirm("Delete all session history?")) {
                localStorage.removeItem('studySessions');
                location.reload();
            }
        }

        window.onload = loadStats;
    </script>
</body>
</html>
